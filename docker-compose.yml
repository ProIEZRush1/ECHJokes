services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
    expose:
      - "8000"
    volumes:
      - shared-storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/up"]
      interval: 10s
      timeout: 5s
      retries: 3

  websocket:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["php", "artisan", "echjokes:stream-server", "--port=8081"]
    expose:
      - "8081"
    volumes:
      - shared-storage:/app/storage
    labels:
      - "traefik.http.services.websocket-echjokes.loadbalancer.server.port=8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  shared-storage:
