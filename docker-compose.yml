services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
    expose:
      - "8000"
    volumes:
      - shared-storage:/app/storage
      - db-data:/app/database
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/up"]
      interval: 10s
      timeout: 5s
      retries: 3

  websocket:
    build:
      context: ./websocket-server
      dockerfile: Dockerfile
    expose:
      - "8081"
    environment:
      - WS_PORT=8081
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_VOICE=${OPENAI_VOICE:-ash}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-iP95p4xoKVk53GoZ742B}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.vacilada-ws.rule=Host(`ws.vacilada.com`)"
      - "traefik.http.routers.vacilada-ws.entrypoints=https"
      - "traefik.http.routers.vacilada-ws.tls=true"
      - "traefik.http.routers.vacilada-ws.tls.certresolver=letsencrypt"
      - "traefik.http.routers.vacilada-ws.service=vacilada-ws-svc"
      - "traefik.http.services.vacilada-ws-svc.loadbalancer.server.port=8081"
    networks:
      - default
      - coolify
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8082"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 5s

networks:
  default:
  coolify:
    external: true

volumes:
  shared-storage:
  db-data:
