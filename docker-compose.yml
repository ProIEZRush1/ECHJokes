services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production-app
    environment:
      - SERVICE_TYPE=app
    expose:
      - "8000"
    volumes:
      - shared-audio:/app/storage/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/up"]
      interval: 10s
      timeout: 5s
      retries: 3

  websocket:
    build:
      context: .
      dockerfile: Dockerfile
      target: production-ws
    environment:
      - SERVICE_TYPE=websocket
    expose:
      - "8081"
    volumes:
      - shared-audio:/app/storage/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  shared-audio:
