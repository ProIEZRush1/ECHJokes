services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
    expose:
      - "8000"
    volumes:
      - shared-storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/up"]
      interval: 10s
      timeout: 5s
      retries: 3

  websocket:
    build:
      context: ./websocket-server
      dockerfile: Dockerfile
    expose:
      - "8081"
    environment:
      - WS_PORT=8081
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_VOICE=${OPENAI_VOICE:-ash}
    labels:
      - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 5s

volumes:
  shared-storage:
