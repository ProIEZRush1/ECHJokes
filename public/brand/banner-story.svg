<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="3" fill="#39ff14" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1080" height="1920" fill="#0a0a0a"/>
  <rect width="1080" height="1920" fill="url(#scan)"/>

  <!-- Top terminal text -->
  <g opacity="0.22" font-family="'JetBrains Mono', monospace" font-size="22" fill="#39ff14">
    <text x="60" y="120">$ vacilada call --target tu_amigo</text>
    <text x="60" y="160">&gt; ringing.....</text>
    <text x="60" y="200">&gt; answered ✓</text>
  </g>

  <!-- Phone icon centered upper third -->
  <g transform="translate(540 600)" filter="url(#glow)">
    <g transform="rotate(-22) scale(4.2)">
      <path d="M -64 0
               C -64 -36, -36 -64, 0 -64
               C 36 -64, 64 -36, 64 0
               L 50 0
               C 50 -16, 38 -28, 22 -28
               L -22 -28
               C -38 -28, -50 -16, -50 0
               Z"
            fill="#39ff14"/>
      <circle cx="-58" cy="-12" r="4" fill="#0a0a0a"/>
      <circle cx="58" cy="-12" r="4" fill="#0a0a0a"/>
    </g>
  </g>

  <!-- ZZZ -->
  <g font-family="'JetBrains Mono', monospace" font-weight="800" fill="#39ff14" filter="url(#glow)" text-anchor="middle">
    <text x="780" y="450" font-size="60" opacity="0.85">Z</text>
    <text x="850" y="380" font-size="80" opacity="0.95">Z</text>
    <text x="930" y="290" font-size="105">Z</text>
  </g>

  <!-- Brand -->
  <text x="540" y="1090" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-size="160" font-weight="800"
        fill="#39ff14" filter="url(#glow)" letter-spacing="-5">Vacilada</text>

  <!-- Tagline -->
  <text x="540" y="1210" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="52" font-weight="700" fill="#ffffff">Bromas telefónicas</text>
  <text x="540" y="1280" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="52" font-weight="700" fill="#ffffff">con Inteligencia Artificial</text>

  <g transform="translate(540 1430)" text-anchor="middle">
    <text x="0" y="0" font-family="'JetBrains Mono', monospace" font-size="38" fill="#9aa59a">Tú describes la broma.</text>
    <text x="0" y="60" font-family="'JetBrains Mono', monospace" font-size="38" fill="#9aa59a">La IA hace la llamada.</text>
    <text x="0" y="120" font-family="'JetBrains Mono', monospace" font-size="38" fill="#9aa59a">Te mueres de risa.</text>
  </g>

  <!-- CTA card -->
  <g transform="translate(540 1700)">
    <rect x="-340" y="-60" width="680" height="120" rx="20" fill="none" stroke="#39ff14" stroke-width="3"/>
    <text x="0" y="20" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="48" font-weight="800" fill="#39ff14">→ vacilada.com</text>
  </g>

  <text x="540" y="1860" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="32" fill="#9aa59a">Hecho en México 🇲🇽 · desde $35 MXN</text>
</svg>
