<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0a0f0a"/>
      <stop offset="50%" stop-color="#0f1a0f"/>
      <stop offset="100%" stop-color="#0a0f0a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg)"/>

  <g opacity="0.08" font-family="monospace" font-size="20" fill="#39ff14">
    <text x="40" y="100">V A C 1 L 4 D 4</text>
    <text x="40" y="150">0 1 1 0 0 1 1</text>
    <text x="40" y="1820">B R O M 4 5 - 0 1</text>
    <text x="40" y="1870">1 1 0 0 1</text>
    <text x="860" y="120">0 1 1</text>
    <text x="860" y="1850">V A C</text>
  </g>

  <!-- Phone icon at top-center -->
  <g transform="translate(540 550)">
    <g transform="scale(3.5)">
      <g transform="rotate(-30)">
        <path d="M -56 -18 Q -56 -34, -40 -34 L -28 -34 Q -18 -34, -14 -22 L -8 -4 Q -6 2, -10 6 L -18 12 Q -14 32, 0 48 L 6 54 Q 12 60, 18 56 L 30 48 Q 38 42, 44 48 L 56 60 Q 66 70, 56 82 L 48 90 Q 38 100, 24 96 Q -12 88, -42 58 Q -72 28, -76 -8 Q -78 -18, -70 -22 Z" fill="#39ff14" filter="url(#glow)"/>
      </g>
      <path d="M 20 -60 Q 42 -56, 50 -30" fill="none" stroke="#39ff14" stroke-width="8" stroke-linecap="round"/>
      <circle cx="38" cy="-72" r="6" fill="#39ff14"/>
      <circle cx="58" cy="-60" r="6" fill="#39ff14"/>
    </g>
  </g>

  <text x="540" y="1060" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="150" font-weight="800" fill="#39ff14" filter="url(#glow)" letter-spacing="-4">Vacilada</text>

  <text x="540" y="1180" text-anchor="middle" font-family="'Inter', sans-serif" font-size="56" font-weight="700" fill="#ffffff">Bromas telefónicas</text>
  <text x="540" y="1250" text-anchor="middle" font-family="'Inter', sans-serif" font-size="56" font-weight="700" fill="#ffffff">con Inteligencia Artificial</text>

  <g transform="translate(540 1400)" text-anchor="middle">
    <text x="0" y="0" font-family="'Inter', sans-serif" font-size="40" fill="#9aa59a">Tú describes la broma.</text>
    <text x="0" y="60" font-family="'Inter', sans-serif" font-size="40" fill="#9aa59a">La IA hace la llamada.</text>
    <text x="0" y="120" font-family="'Inter', sans-serif" font-size="40" fill="#9aa59a">Te mueres de risa.</text>
  </g>

  <text x="540" y="1720" text-anchor="middle" font-size="80">🇲🇽</text>
  <text x="540" y="1820" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="50" font-weight="700" fill="#39ff14">vacilada.com</text>
</svg>
