<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#39ff14" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#scan)"/>

  <!-- Terminal log left edge -->
  <g opacity="0.18" font-family="'JetBrains Mono', monospace" font-size="13" fill="#39ff14">
    <text x="40" y="48">&gt; vacilada init</text>
    <text x="40" y="68">&gt; load voice: ash · es-MX</text>
    <text x="40" y="88">&gt; dial +52 ********</text>
    <text x="40" y="108">&gt; "¿Hablo con el encargado?"</text>
    <text x="40" y="600">&gt; deploy laughter ✓</text>
  </g>

  <!-- Phone icon left -->
  <g transform="translate(280 320)" filter="url(#glow)">
    <g transform="rotate(-22) scale(2.3)">
      <path d="M -64 0
               C -64 -36, -36 -64, 0 -64
               C 36 -64, 64 -36, 64 0
               L 50 0
               C 50 -16, 38 -28, 22 -28
               L -22 -28
               C -38 -28, -50 -16, -50 0
               Z"
            fill="#39ff14"/>
      <circle cx="-58" cy="-12" r="4" fill="#0a0a0a"/>
      <circle cx="58" cy="-12" r="4" fill="#0a0a0a"/>
    </g>
  </g>

  <!-- ZZZ -->
  <g font-family="'JetBrains Mono', monospace" font-weight="800" fill="#39ff14" filter="url(#glow)">
    <text x="370" y="220" font-size="36" opacity="0.85">Z</text>
    <text x="408" y="180" font-size="48" opacity="0.95">Z</text>
    <text x="454" y="135" font-size="60">Z</text>
  </g>

  <!-- Wordmark + tagline -->
  <g transform="translate(540 0)">
    <text x="0" y="270" font-family="'JetBrains Mono', monospace" font-size="120" font-weight="800" fill="#39ff14" filter="url(#glow)" letter-spacing="-3">Vacilada</text>
    <text x="0" y="335" font-family="'JetBrains Mono', monospace" font-size="30" font-weight="700" fill="#ffffff">Bromas telefónicas con IA</text>
    <text x="0" y="385" font-family="'JetBrains Mono', monospace" font-size="22" fill="#9aa59a">Tú describes. La IA llama.</text>
    <text x="0" y="418" font-family="'JetBrains Mono', monospace" font-size="22" fill="#9aa59a">Te mueres de risa.</text>
    <text x="0" y="510" font-family="'JetBrains Mono', monospace" font-size="26" font-weight="700" fill="#39ff14">→ vacilada.com</text>
    <text x="0" y="555" font-family="'JetBrains Mono', monospace" font-size="20" fill="#9aa59a">Hecho en México 🇲🇽 · desde $35 MXN</text>
  </g>
</svg>
