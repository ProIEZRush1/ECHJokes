<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#39ff14" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#scan)"/>

  <!-- Subtle terminal text in corners -->
  <g opacity="0.18" font-family="'JetBrains Mono', monospace" font-size="14" fill="#39ff14">
    <text x="40" y="40">$ vacilada --call --script "soy del SAT"</text>
    <text x="40" y="60">> connecting...</text>
    <text x="40" y="80">> ringing....</text>
    <text x="40" y="100">> answered ✓</text>
    <text x="40" y="120">> joke deployed 😈</text>

    <text x="900" y="600">vacilada.com  ·  v1.0</text>
  </g>

  <!-- Phone icon left -->
  <g transform="translate(290 320)" filter="url(#glow)">
    <g transform="rotate(-22) scale(2.2)">
      <path d="M -64 0
               C -64 -36, -36 -64, 0 -64
               C 36 -64, 64 -36, 64 0
               L 50 0
               C 50 -16, 38 -28, 22 -28
               L -22 -28
               C -38 -28, -50 -16, -50 0
               Z"
            fill="#39ff14"/>
      <circle cx="-58" cy="-12" r="4" fill="#0a0a0a"/>
      <circle cx="58" cy="-12" r="4" fill="#0a0a0a"/>
    </g>
  </g>

  <!-- ZZZ from phone -->
  <g font-family="'JetBrains Mono', monospace" font-weight="800" fill="#39ff14" filter="url(#glow)">
    <text x="380" y="220" font-size="38" opacity="0.85">Z</text>
    <text x="420" y="180" font-size="50" opacity="0.95">Z</text>
    <text x="468" y="135" font-size="62">Z</text>
  </g>

  <!-- Wordmark + tagline -->
  <g transform="translate(540 0)">
    <text x="0" y="280" font-family="'JetBrains Mono', monospace" font-size="130" font-weight="800" fill="#39ff14" filter="url(#glow)" letter-spacing="-3">Vacilada</text>
    <text x="0" y="345" font-family="'JetBrains Mono', monospace" font-size="32" font-weight="700" fill="#ffffff">Bromas telefónicas con IA</text>
    <text x="0" y="400" font-family="'JetBrains Mono', monospace" font-size="24" fill="#9aa59a">Tú describes la broma.</text>
    <text x="0" y="436" font-family="'JetBrains Mono', monospace" font-size="24" fill="#9aa59a">La IA llama y se la cree todo el mundo.</text>
    <text x="0" y="520" font-family="'JetBrains Mono', monospace" font-size="26" font-weight="700" fill="#39ff14">→ vacilada.com  ·  desde $35 MXN</text>
  </g>
</svg>
