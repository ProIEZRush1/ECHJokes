<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f0a"/>
      <stop offset="100%" stop-color="#111a11"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Matrix rain suggestion: faint vertical lines -->
  <g opacity="0.08" font-family="'JetBrains Mono', monospace" font-size="18" fill="#39ff14">
    <text x="40" y="60">0 1 V A C 1 L 4 D 4</text>
    <text x="40" y="120">1 0 B R O M 4 5 1 0</text>
    <text x="1080" y="90">1 1 0 0 1</text>
    <text x="1080" y="200">V A C 1 L</text>
    <text x="1080" y="340">A D 4 0 1</text>
  </g>

  <!-- Logo icon (left side) -->
  <g transform="translate(260 315)">
    <g transform="scale(1.8)">
      <g transform="rotate(-35)">
        <path d="M -56 -18 Q -56 -34, -40 -34 L -28 -34 Q -18 -34, -14 -22 L -8 -4 Q -6 2, -10 6 L -18 12 Q -14 32, 0 48 L 6 54 Q 12 60, 18 56 L 30 48 Q 38 42, 44 48 L 56 60 Q 66 70, 56 82 L 48 90 Q 38 100, 24 96 Q -12 88, -42 58 Q -72 28, -76 -8 Q -78 -18, -70 -22 Z" fill="#39ff14" filter="url(#glow)"/>
      </g>
      <path d="M 20 -60 Q 42 -56, 50 -30" fill="none" stroke="#39ff14" stroke-width="8" stroke-linecap="round"/>
      <circle cx="38" cy="-72" r="5" fill="#39ff14"/>
      <circle cx="58" cy="-60" r="5" fill="#39ff14"/>
    </g>
  </g>

  <!-- Wordmark + tagline (right side) -->
  <g transform="translate(500 0)">
    <text x="0" y="290" font-family="'JetBrains Mono', monospace" font-size="130" font-weight="800" fill="#39ff14" letter-spacing="-3" filter="url(#glow)">Vacilada</text>
    <text x="0" y="360" font-family="'Inter', system-ui, sans-serif" font-size="34" font-weight="600" fill="#ffffff">Bromas telefónicas con IA</text>
    <text x="0" y="410" font-family="'Inter', system-ui, sans-serif" font-size="26" font-weight="400" fill="#9aa59a">La IA llama, habla como humano real,</text>
    <text x="0" y="448" font-family="'Inter', system-ui, sans-serif" font-size="26" font-weight="400" fill="#9aa59a">y graba toda la reacción.</text>
    <text x="0" y="520" font-family="'JetBrains Mono', monospace" font-size="22" fill="#39ff14">→ vacilada.com</text>
  </g>
</svg>
