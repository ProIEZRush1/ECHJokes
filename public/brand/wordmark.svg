<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#39ff14" opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="800" height="200" rx="16" fill="#0a0a0a"/>
  <rect width="800" height="200" rx="16" fill="url(#scan)"/>

  <!-- Phone receiver icon -->
  <g transform="translate(110 110) rotate(-22) scale(0.95)" filter="url(#glow)">
    <path d="M -64 0
             C -64 -36, -36 -64, 0 -64
             C 36 -64, 64 -36, 64 0
             L 50 0
             C 50 -16, 38 -28, 22 -28
             L -22 -28
             C -38 -28, -50 -16, -50 0
             Z"
          fill="#39ff14"/>
    <circle cx="-58" cy="-12" r="4" fill="#0a0a0a"/>
    <circle cx="58" cy="-12" r="4" fill="#0a0a0a"/>
  </g>

  <!-- ZZZ -->
  <g font-family="'JetBrains Mono','Courier New',monospace" font-weight="800" fill="#39ff14" filter="url(#glow)">
    <text x="170" y="56" font-size="20" opacity="0.85">Z</text>
    <text x="188" y="42" font-size="26" opacity="0.95">Z</text>
    <text x="210" y="26" font-size="32">Z</text>
  </g>

  <!-- Wordmark -->
  <text x="240" y="135"
        font-family="'JetBrains Mono','Courier New',monospace"
        font-size="92" font-weight="800" fill="#39ff14"
        filter="url(#glow)" letter-spacing="-2">Vacilada</text>
</svg>
