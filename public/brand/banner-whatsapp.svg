<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" x="0" y="0" width="5" height="5" patternUnits="userSpaceOnUse">
      <rect width="5" height="2.5" fill="#39ff14" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1080" height="1080" fill="#0a0a0a"/>
  <rect width="1080" height="1080" fill="url(#scan)"/>

  <!-- Subtle terminal text -->
  <g opacity="0.2" font-family="'JetBrains Mono', monospace" font-size="18" fill="#39ff14">
    <text x="50" y="70">$ vacilada call</text>
    <text x="50" y="98">&gt; ringing... answered ✓</text>
    <text x="780" y="1040">v1.0 · es-MX</text>
  </g>

  <!-- Phone icon top center -->
  <g transform="translate(540 380)" filter="url(#glow)">
    <g transform="rotate(-22) scale(3.2)">
      <path d="M -64 0
               C -64 -36, -36 -64, 0 -64
               C 36 -64, 64 -36, 64 0
               L 50 0
               C 50 -16, 38 -28, 22 -28
               L -22 -28
               C -38 -28, -50 -16, -50 0
               Z"
            fill="#39ff14"/>
      <circle cx="-58" cy="-12" r="4" fill="#0a0a0a"/>
      <circle cx="58" cy="-12" r="4" fill="#0a0a0a"/>
    </g>
  </g>

  <!-- ZZZ -->
  <g font-family="'JetBrains Mono', monospace" font-weight="800" fill="#39ff14" filter="url(#glow)" text-anchor="middle">
    <text x="760" y="320" font-size="46" opacity="0.85">Z</text>
    <text x="820" y="270" font-size="60" opacity="0.95">Z</text>
    <text x="888" y="200" font-size="80">Z</text>
  </g>

  <!-- Brand -->
  <text x="540" y="710" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-size="140" font-weight="800"
        fill="#39ff14" filter="url(#glow)" letter-spacing="-3">Vacilada</text>

  <!-- Tagline -->
  <text x="540" y="790" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="40" font-weight="700" fill="#ffffff">Bromas telefónicas con IA</text>
  <text x="540" y="845" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="26" fill="#9aa59a">Tú describes. La IA llama. Te mueres de risa.</text>

  <!-- CTA -->
  <g transform="translate(540 950)">
    <rect x="-280" y="-50" width="560" height="100" rx="18" fill="none" stroke="#39ff14" stroke-width="3"/>
    <text x="0" y="14" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="40" font-weight="800" fill="#39ff14">→ vacilada.com</text>
  </g>

  <text x="540" y="1050" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="22" fill="#9aa59a">Hecho en México 🇲🇽 · desde $35 MXN</text>
</svg>
