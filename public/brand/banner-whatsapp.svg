<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f0a"/>
      <stop offset="100%" stop-color="#111a11"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <g opacity="0.08" font-family="monospace" font-size="18" fill="#39ff14">
    <text x="40" y="60">V A C 1 L 4 D 4</text>
    <text x="40" y="100">0 1 1 0 0 1 1</text>
    <text x="40" y="1020">B R O M 4 5 - 0 1</text>
    <text x="820" y="80">0 1 1</text>
    <text x="820" y="1000">V A C</text>
  </g>

  <!-- Big phone icon top center -->
  <g transform="translate(540 340)">
    <g transform="scale(2.8)">
      <g transform="rotate(-30)">
        <path d="M -56 -18 Q -56 -34, -40 -34 L -28 -34 Q -18 -34, -14 -22 L -8 -4 Q -6 2, -10 6 L -18 12 Q -14 32, 0 48 L 6 54 Q 12 60, 18 56 L 30 48 Q 38 42, 44 48 L 56 60 Q 66 70, 56 82 L 48 90 Q 38 100, 24 96 Q -12 88, -42 58 Q -72 28, -76 -8 Q -78 -18, -70 -22 Z" fill="#39ff14" filter="url(#glow)"/>
      </g>
      <path d="M 20 -60 Q 42 -56, 50 -30" fill="none" stroke="#39ff14" stroke-width="8" stroke-linecap="round"/>
      <circle cx="38" cy="-72" r="6" fill="#39ff14"/>
      <circle cx="58" cy="-60" r="6" fill="#39ff14"/>
    </g>
  </g>

  <!-- Brand name -->
  <text x="540" y="680" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="130" font-weight="800" fill="#39ff14" filter="url(#glow)" letter-spacing="-3">Vacilada</text>

  <!-- Tagline -->
  <text x="540" y="760" text-anchor="middle" font-family="'Inter', sans-serif" font-size="42" font-weight="700" fill="#ffffff">Bromas telefónicas con IA</text>
  <text x="540" y="810" text-anchor="middle" font-family="'Inter', sans-serif" font-size="28" fill="#9aa59a">Tú describes. La IA llama. Te mueres de risa.</text>

  <!-- Flag + CTA -->
  <g transform="translate(540 920)">
    <text x="0" y="0" text-anchor="middle" font-size="44">🇲🇽</text>
  </g>
  <text x="540" y="1010" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="36" font-weight="700" fill="#39ff14">vacilada.com</text>
</svg>
