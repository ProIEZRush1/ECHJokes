<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="48" fill="#0a0f0a"/>
  <g transform="translate(128 128)">
    <!-- phone handset, rotated -->
    <g transform="rotate(-35)">
      <path d="M -56 -18
               Q -56 -34, -40 -34
               L -28 -34
               Q -18 -34, -14 -22
               L -8 -4
               Q -6 2, -10 6
               L -18 12
               Q -14 32, 0 48
               L 6 54
               Q 12 60, 18 56
               L 30 48
               Q 38 42, 44 48
               L 56 60
               Q 66 70, 56 82
               L 48 90
               Q 38 100, 24 96
               Q -12 88, -42 58
               Q -72 28, -76 -8
               Q -78 -18, -70 -22
               Z"
            fill="#39ff14"
            stroke="#0a0f0a"
            stroke-width="2"
            filter="url(#glow)"/>
    </g>
    <!-- Mischievous smile curve to the right of the handset -->
    <path d="M 20 -60 Q 42 -56, 50 -30"
          fill="none" stroke="#39ff14" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
    <!-- Eye dots -->
    <circle cx="38" cy="-72" r="4" fill="#39ff14"/>
    <circle cx="58" cy="-60" r="4" fill="#39ff14"/>
  </g>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
