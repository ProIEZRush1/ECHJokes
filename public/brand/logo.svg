<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#39ff14" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Black rounded-square card -->
  <rect width="256" height="256" rx="48" fill="#0a0a0a"/>
  <rect width="256" height="256" rx="48" fill="url(#scan)"/>
  <rect x="6" y="6" width="244" height="244" rx="44" fill="none" stroke="#39ff14" stroke-width="2" opacity="0.55"/>

  <!-- Telephone receiver (centered, slight tilt), neon green -->
  <g transform="translate(128 138) rotate(-22)" filter="url(#glow)">
    <!-- Receiver body: arc with two ear/mouth caps -->
    <path d="M -64 0
             C -64 -36, -36 -64, 0 -64
             C 36 -64, 64 -36, 64 0
             L 50 0
             C 50 -16, 38 -28, 22 -28
             L -22 -28
             C -38 -28, -50 -16, -50 0
             Z"
          fill="#39ff14"/>
    <!-- Earpiece dot -->
    <circle cx="-58" cy="-12" r="4" fill="#0a0a0a"/>
    <!-- Mouthpiece dot -->
    <circle cx="58" cy="-12" r="4" fill="#0a0a0a"/>
  </g>

  <!-- ZZZ sound emerging from earpiece -->
  <g font-family="'JetBrains Mono','Courier New',monospace" font-weight="800" fill="#39ff14" filter="url(#glow)">
    <text x="38" y="76" font-size="22" opacity="0.9">Z</text>
    <text x="58" y="60" font-size="28" opacity="0.95">Z</text>
    <text x="80" y="42" font-size="34">Z</text>
  </g>

  <!-- Bottom wordmark -->
  <text x="128" y="218" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="28" font-weight="800" fill="#39ff14" letter-spacing="1">vacilada</text>
</svg>
